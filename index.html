<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Для тебя ❤️</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh;
            background: #ffe6f2;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        h1 { color: #d63384; font-size: 2.5rem; min-height: 80px; padding: 0 20px; z-index: 10; }

        .buttons { display: flex; gap: 40px; position: relative; width: 100%; justify-content: center; }

        button {
            padding: 15px 45px; font-size: 1.5rem;
            border: none; border-radius: 50px;
            cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        #yesBtn { background: #ff4d4d; color: white; z-index: 10; }
        
        #noBtn {
            background: #adb5bd; color: white;
            position: fixed;
            transition: 0.1s ease;
            left: 55%; top: 55%;
            transform: translate(-50%, -50%);
            z-index: 1000;
        }

        /* Контейнер для финала */
        #finalStage {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 2s;
        }

        #message {
            font-size: 2.5rem;
            color: #ff1493;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        /* Стиль твоей фотки */
        #myPhoto {
            width: 300px; /* Размер фото */
            height: 300px;
            object-fit: cover;
            border-radius: 20px; /* Скругленные углы */
            border: 5px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .flower {
            position: fixed; top: -50px;
            font-size: 2rem; pointer-events: none;
            z-index: 9999; animation: fall linear forwards;
        }

        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <audio id="audio" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- Начальный экран -->
    <div id="ui">
        <h1 id="question">Ты меня любишь?</h1>
        <div class="buttons">
            <button id="yesBtn">Да</button>
            <button id="noBtn">Нет</button>
        </div>
    </div>

    <!-- Финальный экран с фото -->
    <div id="finalStage">
        <div id="message">Я тебя тоже очень сильно люблю! ❤️</div>
        <img id="myPhoto" src="photo.jpg" alt="Наше фото">
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const question = document.getElementById('question');
        const ui = document.getElementById('ui');
        const finalStage = document.getElementById('finalStage');
        const audio = document.getElementById('audio');

        let isSecondStage = false;

        const phrases = [
            "Неправильно, малышка! ❌",
            "Не на то нажимаешь, любимая 😉",
            "Попробуй еще раз, глупышка ❤️",
            "Кнопка сломалась, жми 'Да'!",
            "Даже не думай! 😂"
        ];

        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            noBtn.style.transform = 'none';
            question.innerText = phrases[Math.floor(Math.random() * phrases.length)];
        });

        yesBtn.addEventListener('click', () => {
            if (!isSecondStage) {
                isSecondStage = true;
                question.innerText = "Точно-точно любишь? 🥺";
                yesBtn.style.transform = "scale(1.3)";
            } else {
                ui.style.display = 'none';
                finalStage.style.display = 'flex';
                document.body.style.background = '#fff0f5';

                audio.play().catch(() => console.log("Нужен файл music.mp3"));
                setInterval(createFlower, 150);
            }
        });

        function createFlower() {
            const f = document.createElement('div');
            f.className = 'flower';
            const items = ['🌸', '🌹', '❤️', '💖', '✨'];
            f.innerText = items[Math.floor(Math.random() * items.length)];
            f.style.left = Math.random() * 100 + 'vw';
            f.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 5000);
        }
    </script>
</body>
</html>
